<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NZ Earthquake Dashboard</title>

        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        />
        <link rel="stylesheet" href="static/style.css" />

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    </head>
    <body>
        <header>
            <h1>NZ Earthquake Dashboard</h1>
            <nav id="mode-nav">
                <a href="?mode=stations" id="nav-stations">Stations</a>
                <a href="?mode=events" id="nav-events">Events</a>
            </nav>
            <div id="utc-clock"></div>
        </header>

        <div id="main-content">
            <div id="map"></div>

            <div id="station-panel">
                <div id="station-panel-header">
                    <div id="station-panel-title">No station selected</div>
                    <div
                        id="station-panel-subtitle"
                        class="station-panel-subtext"
                    >
                        Click a station on the map
                    </div>
                    <div
                        id="station-panel-measured-at"
                        class="station-panel-subtext"
                    ></div>
                </div>
                <div id="station-panel-body"></div>
            </div>

            <div id="event-panel">
                <div id="event-panel-header">
                    <div id="event-panel-title">Recent Events</div>
                    <div id="event-panel-subtitle" class="station-panel-subtext"></div>
                    <select id="event-timeframe">
                        <option value="1h">Last hour</option>
                        <option value="24h" selected>Last 24 hours</option>
                        <option value="1w">Last week</option>
                        <option value="1m">Last month</option>
                    </select>
                </div>
                <div id="event-panel-body"></div>
            </div>
        </div>

        <script type="module" src="static/map.js"></script>
        <script type="module" src="static/clock.js"></script>
    </body>
</html>
