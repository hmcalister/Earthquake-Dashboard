<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NZ Earthquake Dashboard</title>

        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        />
        <link rel="stylesheet" href="static/style.css" />

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    </head>
    <body>
        <header>
            <h1>NZ Earthquake Dashboard</h1>
            <div id="utc-clock"></div>
        </header>

        <div id="main-content">
            <div id="map"></div>

            <div id="station-panel">
                <div id="station-panel-header">
                    <div id="station-panel-header-text">
                        <div id="station-panel-title">No station selected</div>
                        <div
                            id="station-panel-subtitle"
                            class="station-panel-subtext"
                        >
                            Click a station on the map
                        </div>
                        <div
                            id="station-panel-measured-at"
                            class="station-panel-subtext"
                        ></div>
                    </div>
                    <button
                        id="station-panel-close-button"
                        aria-label="Close panel"
                    >
                        &times;
                    </button>
                </div>
                <div id="station-panel-body"></div>
            </div>
        </div>

        <script type="module" src="static/map.js"></script>
        <script type="module" src="static/clock.js"></script>
    </body>
</html>
