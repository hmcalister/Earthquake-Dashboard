<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NZ Earthquake Dashboard</title>

        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        />
        <link rel="stylesheet" href="static/style.css" />

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    </head>
    <body>
        <header>
            <h1>NZ Earthquake Dashboard</h1>
        </header>

        <div id="main-content">
            <div id="map"></div>

            <div id="station-panel">
                <div id="station-panel-header">
                    <div id="station-panel-header-text">
                        <div id="station-panel-title">No station selected</div>
                        <div id="station-panel-subtitle">
                            Click a station on the map
                        </div>
                        <div id="station-panel-measured-at"></div>
                    </div>
                    <button id="station-panel-close" aria-label="Close panel">
                        &times;
                    </button>
                </div>
                <div id="station-panel-body"></div>
            </div>
        </div>

        <script>
            // ================================================================
            // Map
            // ================================================================

            const map = L.map("map").setView([-41.5, 172.5], 5);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "© OpenStreetMap contributors",
                maxZoom: 18,
            }).addTo(map);

            // ================================================================
            // Station panel
            // ================================================================

            const stationPanel = document.getElementById("station-panel");
            const panelTitle = document.getElementById("station-panel-title");
            const panelSubtitle = document.getElementById("station-panel-subtitle");
            const panelMeasuredAt = document.getElementById("station-panel-measured-at");
            const panelBody = document.getElementById("station-panel-body");

            document
                .getElementById("station-panel-close")
                .addEventListener("click", () => stationPanel.classList.remove("open"));

            function openStationPanel(s) {
                stationPanel.classList.add("open");
                panelTitle.textContent = `${s.station_code} — ${s.station_name}`;
                panelSubtitle.textContent = `${s.latitude.toFixed(4)}, ${s.longitude.toFixed(4)}  ·  ${s.elevation_m} m`;
                panelMeasuredAt.textContent = "";
                panelBody.innerHTML = `<em style="color:var(--text-color-light-secondary)">Loading readings…</em>`;

                fetch(`/api/stations/${s.station_code}/readings`)
                    .then((r) => r.json())
                    .then((data) => {
                        if (data.error) {
                            panelBody.innerHTML = `<p style="color:var(--text-color-light-secondary)">${data.error}</p>`;
                            return;
                        }
                        panelMeasuredAt.textContent = `Measured At: ${data.measured_at}`;
                        panelBody.innerHTML = "";
                        data.traces.forEach((t) => {
                            const block = document.createElement("div");
                            block.className = "channel-block";

                            const label = document.createElement("div");
                            label.className = "channel-label";
                            label.textContent = `${t.channel}  ·  ${t.sampling_rate} Hz`;

                            const canvas = document.createElement("canvas");
                            canvas.className = "channel-canvas";

                            block.appendChild(label);
                            block.appendChild(canvas);
                            panelBody.appendChild(block);

                            requestAnimationFrame(() =>
                                drawTrace(canvas, t.data, t.start_time, t.end_time),
                            );
                        });
                    })
                    .catch(() => {
                        panelBody.innerHTML = `<p style="color:var(--text-color-light-secondary)">Failed to load readings.</p>`;
                    });
            }

            // ================================================================
            // Trace canvas rendering
            // ================================================================

            function drawTrace(canvas, data, startTime, endTime) {
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                const ctx = canvas.getContext("2d");
                ctx.scale(dpr, dpr);

                const w = rect.width;
                const h = rect.height;

                const marginL = 52;
                const marginB = 18;
                const marginT = 10;
                const marginR = 4;
                const plotW = w - marginL - marginR;
                const plotH = h - marginT - marginB;

                // Symmetric Y axis centred on 0: range is [-peak, +peak]
                const peak =
                    Math.max(Math.abs(Math.min(...data)), Math.abs(Math.max(...data))) || 1;
                const toY = (v) => marginT + (1 - (v + peak) / (2 * peak)) * plotH;

                const axisColor = getComputedStyle(document.documentElement)
                    .getPropertyValue("--text-color-light");
                ctx.font = "10px system-ui, sans-serif";
                ctx.strokeStyle = axisColor;
                ctx.fillStyle = axisColor;
                ctx.lineWidth = 1;

                // Y axis
                ctx.beginPath();
                ctx.moveTo(marginL, marginT);
                ctx.lineTo(marginL, marginT + plotH);
                ctx.stroke();

                // X axis
                ctx.beginPath();
                ctx.moveTo(marginL, marginT + plotH);
                ctx.lineTo(marginL + plotW, marginT + plotH);
                ctx.stroke();

                // Y axis ticks and labels: +peak, 0, -peak
                [peak, 0, -peak].forEach((v) => {
                    const y = toY(v);
                    ctx.beginPath();
                    ctx.moveTo(marginL - 3, y);
                    ctx.lineTo(marginL, y);
                    ctx.stroke();
                    ctx.textAlign = "right";
                    ctx.textBaseline = "middle";
                    ctx.fillText(v === 0 ? "0" : v.toExponential(1), marginL - 8, y);
                });

                // X axis labels: start and end time (HH:MM:SS)
                const fmtTime = (iso) => iso.slice(11, 19);
                ctx.textBaseline = "top";
                ctx.textAlign = "left";
                ctx.fillText(fmtTime(startTime), marginL, marginT + plotH + 3);
                ctx.textAlign = "right";
                ctx.fillText(fmtTime(endTime), marginL + plotW, marginT + plotH + 3);

                // Trace
                ctx.strokeStyle = "#2a8a9a";
                ctx.beginPath();
                data.forEach((v, i) => {
                    const x = marginL + (i / (data.length - 1)) * plotW;
                    const y = toY(v);
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();
            }

            // ================================================================
            // Station markers
            // ================================================================

            const stationCluster = L.markerClusterGroup({ maxClusterRadius: 40 });

            fetch("/api/stations")
                .then((r) => r.json())
                .then((stations) => {
                    stations.forEach((s) => {
                        L.circleMarker([s.latitude, s.longitude], {
                            radius: 10,
                            color: "#111",
                            fillColor: "#2a8a9a",
                            fillOpacity: 1.0,
                            weight: 2.5,
                        })
                            .on("click", () => openStationPanel(s))
                            .addTo(stationCluster);
                    });
                    map.addLayer(stationCluster);
                });
        </script>
    </body>
</html>
